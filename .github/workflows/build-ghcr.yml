name: Build and Push PHP Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.php83
      - Dockerfile.php84
      - Dockerfile.php85
      - Caddyfile
      - php.ini
      - docker/php-extensions/**
      - .github/workflows/build-ghcr.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/leaflownet/php

jobs:
  build:
    name: Build php${{ matrix.php_version }}
    runs-on: leaflow-php
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "8.3"
            dockerfile: ./Dockerfile.php83
          - php_version: "8.4"
            dockerfile: ./Dockerfile.php84
          - php_version: "8.5"
            dockerfile: ./Dockerfile.php85

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_REPO }}:php${{ matrix.php_version }}
          build-args: |
            FRANKENPHP_REPO=dunglas/frankenphp
