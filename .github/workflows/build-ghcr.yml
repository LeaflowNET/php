name: Build and Push PHP Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Caddyfile
      - php.ini
      - .github/workflows/build-ghcr.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/leaflownet/php
  FRANKENPHP_SERIES: "1.3"

jobs:
  build:
    name: Build php${{ matrix.php_version }}
    runs-on:
      - self-hosted
      - leaflow-cloud
    strategy:
      fail-fast: false
      matrix:
        php_version:
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_REPO }}:php${{ matrix.php_version }}
          build-args: |
            FRANKENPHP_SERIES=${{ env.FRANKENPHP_SERIES }}
            PHP_VERSION=${{ matrix.php_version }}
